name: Playwright Auto Tests

on:
  workflow_dispatch:
    inputs:
      issue_number:
        description: "GitHub issue number to comment results on"
        required: true
      test_file:
        description: "Relative path of test file to run (e.g. tests/auto-42-foo.spec.ts). Leave empty to run all tests."
        required: false
        default: ""

permissions:
  issues: write
  contents: read

jobs:
  test:
    name: Run Playwright Tests
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        working-directory: Playwright
        run: npm install

      - name: Install Playwright browsers
        working-directory: Playwright
        run: npx playwright install chromium --with-deps

      - name: Run Playwright tests
        working-directory: Playwright
        run: npx playwright test ${{ github.event.inputs.test_file }}
        env:
          BASE_URL: ${{ vars.PLAYWRIGHT_BASE_URL }}
        continue-on-error: true  # Always proceed to report step

      - name: Upload HTML report as artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report-${{ github.run_number }}
          path: Playwright/playwright-report/
          retention-days: 30

      - name: Upload test results JSON
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results-json-${{ github.run_number }}
          path: Playwright/test-results/results.json
          retention-days: 30

      - name: Set issue number
        id: extract_issue
        if: always()
        run: |
          echo "issue_number=${{ github.event.inputs.issue_number }}" >> $GITHUB_OUTPUT
          echo "Issue number: ${{ github.event.inputs.issue_number }}"

      - name: Build and post report comment
        if: always() && steps.extract_issue.outputs.issue_number != ''
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs');
            const path = require('path');

            const issueNumber = parseInt('${{ steps.extract_issue.outputs.issue_number }}');
            const runNumber = '${{ github.run_number }}';
            const runUrl = `https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}`;

            // Parse test results JSON
            let total = 0, passed = 0, failed = 0, skipped = 0;
            let failedTests = [];
            const resultsPath = 'Playwright/test-results/results.json';

            if (fs.existsSync(resultsPath)) {
              const results = JSON.parse(fs.readFileSync(resultsPath, 'utf8'));
              const suites = results.suites || [];

              function processSuite(suite) {
                for (const spec of (suite.specs || [])) {
                  for (const test of (spec.tests || [])) {
                    total++;
                    const status = test.results?.[0]?.status;
                    if (status === 'passed') passed++;
                    else if (status === 'skipped') skipped++;
                    else {
                      failed++;
                      const errMsg = test.results?.[0]?.error?.message || 'Unknown error';
                      failedTests.push(`- \`${spec.file} > ${spec.title}\` — ${errMsg.split('\n')[0]}`);
                    }
                  }
                }
                for (const child of (suite.suites || [])) {
                  processSuite(child);
                }
              }
              suites.forEach(processSuite);
            } else {
              // results.json missing — fallback message
              failedTests.push('- Could not parse test results. Check the Actions run for details.');
            }

            const overallStatus = failed === 0 && total > 0 ? '✅ Passed' : failed > 0 ? '❌ Failed' : '⚠️ No tests ran';
            const artifactUrl = `${runUrl}#artifacts`;

            let body = `## 🎭 Playwright Test Report — Issue #${issueNumber}\n\n`;
            body += `| Status | Total | Passed | Failed | Skipped |\n`;
            body += `|--------|-------|--------|--------|---------|\n`;
            body += `| ${overallStatus} | ${total} | ${passed} | ${failed} | ${skipped} |\n\n`;

            if (failedTests.length > 0) {
              body += `### Failed Tests\n${failedTests.join('\n')}\n\n`;
            }

            body += `📎 [Download Full HTML Report](${artifactUrl}) | 🔗 [View Actions Run](${runUrl})\n`;
            body += `\n> Run #${runNumber} triggered by commit \`${context.sha.substring(0, 7)}\``;

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issueNumber,
              body: body,
            });

            console.log(`Posted report comment to issue #${issueNumber}`);
